# Container configuration, baked into the Docker image.
# Paths are relative to the container working directory (/app).
# Secrets are injected at runtime from environment variables.

owner:
  whatsapp_jid: "${OWNER_JID}" # required — your WhatsApp JID, e.g. 6281234567890@s.whatsapp.net
  name: "Owner"
  timezone: "Asia/Jakarta"

whatsapp:
  enabled: true # link your phone from the Integrations page (QR) after first boot
  database: "data/whatsmeow.db" # persisted in the /app/data volume

web:
  enabled: true
  port: 8090
  password: "${WEB_PASSWORD}" # required — from the WEB_PASSWORD env var
  static_dir: "client/dist" # built client, copied into the image

database:
  # Defaults to the single-file SQLite backend; docker-compose flips this to
  # "hybrid" via the DB_DRIVER env var (PostgreSQL for main data, MongoDB for
  # logs), injecting the DSN/URI below from the environment (see .env.example).
  driver: "sqlite"
  path: "data/assistant.db" # used only when driver is "sqlite"
  postgres_dsn: "${POSTGRES_DSN}"
  mongo_uri: "${MONGO_URI}"
  mongo_db: "assistant_logs"

google:
  credentials_file: "config/google_credentials.json" # only used if calendar/email below are enabled

capabilities:
  # Native Google calendar/email are OFF by default: they need interactive
  # Google OAuth credentials that a fresh server doesn't have. Connect
  # calendar/email (and more) through the Integrations page (Composio) instead.
  # To use the native Google integration, mount a google_credentials.json into
  # /app/config and set these to true.
  calendar:
    enabled: false
    default_duration: "1h"
    max_results: 10
  email:
    enabled: false
    auto_send: false
  reminders:
    enabled: true
    check_interval: "30s"
  knowledge:
    enabled: true
    max_note_length: 10000

security:
  encryption_key: "${ENCRYPTION_KEY}" # required — 32 bytes, base64 (openssl rand -base64 32)

logging:
  level: "info"
  format: "text"
