root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -tags sqlite_fts5 -o ./tmp/personal-assistant ./cmd/assistant"
  bin = "./tmp/personal-assistant"
  args_bin = ["-config", "config/config.yaml"]
  include_ext = ["go", "yaml"]
  exclude_dir = ["tmp", "data", "docs", "vendor", "node_modules"]
  delay = 1000

[misc]
  clean_on_exit = true
