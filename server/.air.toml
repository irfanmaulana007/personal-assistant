root = ".."
tmp_dir = "server/tmp"

[build]
  cmd = "go build -o ./server/tmp/personal-assistant ./server/cmd/assistant"
  bin = "./server/tmp/personal-assistant"
  args_bin = ["-config", "server/config/config.yaml"]
  include_ext = ["go", "yaml"]
  exclude_dir = ["tmp", "data", "docs", "vendor", "client", "node_modules"]
  delay = 1000

[misc]
  clean_on_exit = true
