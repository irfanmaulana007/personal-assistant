name: Deploy Backend

# Independent backend pipeline: fires only when backend code (or its Dockerfile)
# changes, so shipping the API never rebuilds the web app or mobile.
on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'go.mod'
      - 'go.sum'
      - 'deploy/backend.Dockerfile'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  image:
    name: Build & push backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/backend.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Deploy-to-host step is infra-specific; add it here (SSH pull + restart, a
      # Fly/Render/Railway deploy action, k8s rollout, …) once the target exists.
