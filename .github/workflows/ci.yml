name: CI

# One CI run, two independent jobs — the web workspace and the Go backend —
# so a change to one service is validated without coupling it to the other.
on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

jobs:
  web:
    name: Web (shared typecheck + lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck shared package
        run: pnpm --filter @personal-assistant/shared typecheck
      - name: Lint web client
        run: pnpm --filter web lint
      - name: Build web client
        run: pnpm --filter web build

  backend:
    name: Backend (vet + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: go vet ./app/api/...
      - name: Build server
        run: CGO_ENABLED=0 go build -o /dev/null ./app/api/cmd/assistant
