name: Deploy Web

# Independent web pipeline: fires when the web app OR the shared package changes
# (the web bundle embeds the shared code), so shipping the web app never rebuilds
# the backend or mobile.
on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'packages/**'
      - 'deploy/web.Dockerfile'
      - 'deploy/web-nginx.conf.template'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  image:
    name: Build & push web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/web.Dockerfile
          push: true
          # WEB_API_BASE_URL (repo variable) points the bundle at the backend's
          # public origin. Leave it unset to serve API same-origin via the nginx
          # proxy baked into the web image.
          build-args: |
            VITE_API_BASE_URL=${{ vars.WEB_API_BASE_URL }}
          tags: |
            ghcr.io/${{ github.repository }}/web:latest
            ghcr.io/${{ github.repository }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Deploy-to-host step is infra-specific; add it here (static host upload or
      # container rollout) once the target exists.
