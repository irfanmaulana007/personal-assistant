services:
  assistant:
    build: .
    restart: unless-stopped
    ports:
      - '8090:8090'
    volumes:
      - assistant-data:/app/data
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WEB_PASSWORD=${WEB_PASSWORD}
      - OWNER_JID=${OWNER_JID}
      - LOG_LEVEL=${LOG_LEVEL:-info}

volumes:
  assistant-data:
