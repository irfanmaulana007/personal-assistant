services:
  assistant:
    build: .
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./server/data:/app/server/data
      - ./server/config:/app/server/config
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WEB_PASSWORD=${WEB_PASSWORD}
    stdin_open: true
    tty: true
