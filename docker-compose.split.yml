# Split deployment (local parity with the independently-deployed services).
#
# Runs the backend API and the web app as SEPARATE images/containers — mirroring
# how they ship in production via the per-service pipelines — alongside Postgres
# + Mongo. Contrast with the repo-root docker-compose.yml, which runs the single
# combined image for quick all-in-one local dev.
#
# From the repo root:
#   docker compose -f docker-compose.split.yml --env-file .env up --build
#
# The web container serves static assets on :8080 and proxies /api to the backend
# (VITE_API_BASE_URL left empty ⇒ same-origin), so the app behaves exactly like
# the combined build while each service is built and scaled on its own.
services:
  backend:
    build:
      context: .
      dockerfile: app/api/Dockerfile
    restart: unless-stopped
    environment:
      - APP_ENV=${APP_ENV:-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - WEB_PASSWORD=${WEB_PASSWORD}
      - OWNER_JID=${OWNER_JID}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - POSTGRES_DSN=postgres://assistant:${POSTGRES_PASSWORD}@postgres:5432/assistant?sslmode=disable
      - MONGO_URI=mongodb://root:${MONGO_PASSWORD}@mongo:27017/?authSource=admin
      - MONGO_DB=assistant_logs
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: app/web/Dockerfile
      args:
        # Empty ⇒ the web app calls the backend same-origin through the nginx
        # /api proxy below. Set to the backend's public URL to call it directly.
        VITE_API_BASE_URL: ''
    restart: unless-stopped
    ports:
      - '8080:80'
    environment:
      - BACKEND_URL=http://backend:8090
    depends_on:
      - backend

  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      - POSTGRES_USER=assistant
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=assistant
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U assistant -d assistant']
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  mongodata:
