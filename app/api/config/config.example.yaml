# Names this deployment ("local" / "production", ...). Shown in the Logs
# run-detail copy so a pasted trace makes clear which database holds its data.
# Override with the APP_ENV env var; defaults to "local".
environment: "local"

owner:
  whatsapp_jid: "6281234567890@s.whatsapp.net" # optional — derived from pairing
  name: "Your Name"
  timezone: "Asia/Jakarta"

whatsapp:
  enabled: true # then link your phone from the Integrations page (QR)
  # whatsmeow's session is stored in Postgres (its own whatsmeow_* tables),
  # using database.postgres_dsn below — no separate database file is needed.

web:
  enabled: true
  port: 8090
  password: "" # Set via WEB_PASSWORD env var
  static_dir: "../web/dist"

database:
  # The app runs on PostgreSQL (main data) + MongoDB (logs). Both are required.
  #
  # These default to environment variables, which is how production is wired
  # (docker-compose / Dokploy inject POSTGRES_DSN / MONGO_URI — see .env.example).
  postgres_dsn: "${POSTGRES_DSN}"
  mongo_uri: "${MONGO_URI}"
  mongo_db: "assistant_logs"
  #
  # For LOCAL development, start a local Postgres + Mongo, then either export
  # POSTGRES_DSN / MONGO_URI in the shell that launches the server, OR replace
  # the three lines above with direct localhost values, e.g.:
  #
  #   postgres_dsn: "postgres://postgres:postgres@localhost:5432/personal_assistant?sslmode=disable"
  #   mongo_uri: "mongodb://localhost:27017/?authSource=admin"
  #   mongo_db: "personal_assistant"
  #
  # A quick way to get both databases locally:
  #   docker run -d --name pa-pg    -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres \
  #     -e POSTGRES_DB=personal_assistant -p 5432:5432 postgres:17
  #   docker run -d --name pa-mongo -p 27017:27017 mongo:7
  # The Postgres schema and Mongo indexes are created automatically on first boot.

google:
  credentials_file: "config/google_credentials.json"

# NOTE: The LLM provider, API key, model, and base URL are NOT configured here.
# They are managed at runtime from the Settings page and stored (encrypted) in
# the database, which is their single source of truth.

capabilities:
  calendar:
    enabled: true
    default_duration: "1h"
    max_results: 10
  email:
    enabled: true
    auto_send: false
  reminders:
    enabled: true
    check_interval: "30s"
  knowledge:
    enabled: true
    max_note_length: 10000

security:
  encryption_key: "" # Set via ENCRYPTION_KEY env var (32 bytes, base64 encoded)

logging:
  level: "info"
  format: "text"
